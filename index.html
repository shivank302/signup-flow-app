<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile App Signup Flow</title>
  <link rel="stylesheet" href="https://unpkg.com/lucide@latest" />
  <style>
    :root {
      --bg: linear-gradient(135deg, #6a11cb, #7d1f61);
      --box-bg: #ffffff;
      --text-color: #333;
      --input-bg: #f3f3f3;
      --shadow: rgba(0, 0, 0, 0.2);
    }

    body.dark {
      --bg: linear-gradient(135deg, #121212, #2c2c2c);
      --box-bg: #1e1e1e;
      --text-color: #f5f5f5;
      --input-bg: #2c2c2c;
      --shadow: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: "Poppins", sans-serif;
      background: var(--bg);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.4s;
    }

    .box {
      background: var(--box-bg);
      padding: 35px;
      border-radius: 20px;
      width: 330px;
      text-align: center;
      box-shadow: 0 8px 25px var(--shadow);
      transition: 0.4s;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: var(--text-color);
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 15px;
    }

    .input-group i {
      margin-right: 8px;
      color: #8f2414;
    }

    input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      font-size: 15px;
      color: var(--text-color);
    }

    .gradient-btn {
      width: 100%;
      background: linear-gradient(135deg, #6a11cb, #8c0a22c2);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .gradient-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(145, 64, 134, 0.4);
    }

    p {
      font-size: 14px;
      color: var(--text-color);
      margin-top: 15px;
    }

    a {
      color: #88113099;
      text-decoration: none;
    }

    .theme-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--box-bg);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.3s;
    }

    .theme-btn:hover {
      transform: rotate(20deg);
    }

    @media (max-width: 400px) {
      .box {
        width: 90%;
        padding: 25px;
      }
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-btn">🌙</button>

  <div class="container">

    <!-- Signup Section -->
    <div id="signupSection" class="box section active">
      <h2>Create Account</h2>
      <form id="signupForm">
        <div class="input-group">
          <i data-lucide="user"></i>
          <input type="text" id="name" placeholder="Full Name" required />
        </div>
        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="email" id="email" placeholder="Email" required />
        </div>
        <div class="input-group">
          <i data-lucide="lock"></i>
          <input type="password" id="password" placeholder="Password" required minlength="6" />
        </div>
        <button type="submit" class="gradient-btn">Sign Up</button>
        <p>Already have an account? <a href="#" id="goLogin">Login</a></p>
      </form>
    </div>

    <!-- Login Section -->
    <div id="loginSection" class="box section">
      <h2>Welcome Back 👋</h2>
      <form id="loginForm">
        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="email" id="loginEmail" placeholder="Email" required />
        </div>
        <div class="input-group">
          <i data-lucide="lock"></i>
          <input type="password" id="loginPassword" placeholder="Password" required />
        </div>
        <button type="submit" class="gradient-btn">Login</button>
        <p><a href="#" id="forgotPass">Forgot Password?</a></p>
        <p>Don’t have an account? <a href="#" id="goSignup">Sign Up</a></p>
      </form>
    </div>

    <!-- Forgot Password Section -->
    <div id="forgotSection" class="box section">
      <h2>Reset Password</h2>
      <form id="resetForm">
        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="email" id="resetEmail" placeholder="Enter your email" required />
        </div>
        <button type="submit" class="gradient-btn">Reset</button>
        <p><a href="#" id="backToLogin">Back to Login</a></p>
      </form>
    </div>

    <!-- Welcome Section -->
    <div id="welcomeSection" class="box section">
      <h2 id="welcomeMsg">Welcome!</h2>
      <button id="logoutBtn" class="gradient-btn">Logout</button>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    // === Theme Toggle ===
    const themeBtn = document.getElementById("themeToggle");
    themeBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
      );
    });
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

    // === Sections ===
    const signupSection = document.getElementById("signupSection");
    const loginSection = document.getElementById("loginSection");
    const welcomeSection = document.getElementById("welcomeSection");
    const forgotSection = document.getElementById("forgotSection");

    document.getElementById("goLogin").onclick = () => {
      signupSection.classList.remove("active");
      loginSection.classList.add("active");
    };
    document.getElementById("goSignup").onclick = () => {
      loginSection.classList.remove("active");
      signupSection.classList.add("active");
    };
    document.getElementById("forgotPass").onclick = () => {
      loginSection.classList.remove("active");
      forgotSection.classList.add("active");
    };
    document.getElementById("backToLogin").onclick = () => {
      forgotSection.classList.remove("active");
      loginSection.classList.add("active");
    };

    // === Signup Logic ===
    document.getElementById("signupForm").onsubmit = (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (password.length < 6) {
        alert("Password must be at least 6 characters long!");
        return;
      }

      localStorage.setItem("userName", name);
      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPassword", password);

      alert("Signup Successful! Please login now.");
      signupSection.classList.remove("active");
      loginSection.classList.add("active");
    };

    // === Login Logic ===
    document.getElementById("loginForm").onsubmit = (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      const savedEmail = localStorage.getItem("userEmail");
      const savedPassword = localStorage.getItem("userPassword");
      const name = localStorage.getItem("userName");

      if (email === savedEmail && password === savedPassword) {
        localStorage.setItem("isLoggedIn", "true");
        document.getElementById("welcomeMsg").textContent = `Welcome, ${name}! 🌟`;
        loginSection.classList.remove("active");
        welcomeSection.classList.add("active");
      } else {
        alert("Invalid email or password!");
      }
    };

    // === Forgot Password Logic ===
    document.getElementById("resetForm").onsubmit = (e) => {
      e.preventDefault();
      const resetEmail = document.getElementById("resetEmail").value.trim();
      const savedEmail = localStorage.getItem("userEmail");

      if (resetEmail === savedEmail) {
        const newPass = prompt("Enter your new password:");
        if (newPass && newPass.length >= 6) {
          localStorage.setItem("userPassword", newPass);
          alert("Password reset successful!");
          forgotSection.classList.remove("active");
          loginSection.classList.add("active");
        } else {
          alert("Password must be at least 6 characters!");
        }
      } else {
        alert("Email not found!");
      }
    };

    // === Logout ===
    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("isLoggedIn");
      welcomeSection.classList.remove("active");
      loginSection.classList.add("active");
    };
  </script>
</body>
</html>
